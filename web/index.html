  <style>
    body { margin: 0; background-color: #1A1A2E; }
    .loading-screen {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      height: 100vh; background: #1A1A2E;
      font-family: 'Inter', 'Segoe UI', sans-serif; color: #F0A830;
      font-size: 1.1rem;
    }
    .loading-screen::before {
      content: '';
      width: 80px; height: 80px; border-radius: 50%;
      background: #F0A830;
      margin-bottom: 20px;
      animation: pulse 1.5s infinite;
    }
    .loading-screen::after {
      content: 'Cúrcuma';
      font-weight: 700; font-size: 1.4rem; letter-spacing: 1px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>

  <div class="loading-screen" id="loading"></div>
