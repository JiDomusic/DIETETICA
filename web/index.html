  <style>
    body { margin: 0; background-color: #0a0e14; }
    .loading-screen {
      display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #0a0e14;
      font-family: 'Segoe UI', sans-serif; color: #2E7D32;
      font-size: 1.2rem;
    }
    .loading-screen::after {
      content: '🌿 Cargando...';
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>

      projectId: "dietetica-centro",

      messagingSenderId: "462686513020",
      appId: "1:462686513020:web:875fc574ef4e8af25ea6f9",
